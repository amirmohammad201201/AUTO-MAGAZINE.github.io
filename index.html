<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO MAGAZINE | مدیریت</title>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: Tahoma, sans-serif; margin: 0; padding: 0; }
        
        /* بخش هدر و لوگو */
        .header { text-align: center; padding: 30px 0 10px 0; }
        .logo { color: #D4AF37; font-size: 3.5rem; font-weight: bold; margin: 0; letter-spacing: 3px; }
        
        /* منوی اصلی - همان بخشی که گفتی */
        .main-nav {
            border-top: 1px solid #D4AF37;
            border-bottom: 1px solid #D4AF37;
            margin: 20px auto;
            padding: 15px 0;
            max-width: 900px;
            display: flex;
            justify-content: center;
            gap: 50px; /* فاصله بین گزینه‌ها */
        }
        
        .nav-item {
            color: #D4AF37;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .nav-item:hover {
            color: #fff;
            text-shadow: 0 0 10px #D4AF37;
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        /* استایل کارت‌های مقالات زیر منو */
        .article-card { 
            background: #161616; 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: 0.3s;
        }
        .article-card:hover { border-color: #D4AF37; transform: translateY(-3px); }
        .article-card h2 { color: #eee; margin: 0; font-size: 1.2rem; }
        
        .btn-read { 
            background: transparent; 
            color: #D4AF37; 
            border: 1px solid #D4AF37; 
            padding: 8px 20px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-read:hover { background: #D4AF37; color: #000; }

        /* بخش مخفی مقایسه */
        #compare-engine {
            display: none;
            background: #111;
            border: 1px solid #D4AF37;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 class="logo">AUTO MAGAZINE</h1>
</div>

<div class="main-nav">
    <a class="nav-item">اخبار</a>
    <a class="nav-item">لیست قیمت</a>
    <a href="#" class="nav-item" onclick="toggleCompare()">مقایسه هوشمند</a>
</div>

<div class="container">
    
    <div id="compare-engine">
        <h3 style="color: #D4AF37;">پنل مقایسه اختصاصی</h3>
        <p style="font-size: 0.9rem; color: #888;">خودروهای مورد نظر را برای تحلیل هوشمند انتخاب کنید</p>
        </div>

    <div class="article-card">
        <h2>Volkswagen Golf Mk7 GTE</h2>
        <a href="articles/golf-gte.html" class="btn-read">بررسی فنی</a>
    </div>

    <div class="article-card">
        <h2>Citroen Xantia</h2>
        <a href="articles/xantia.html" class="btn-read">بررسی فنی</a>
    </div>

    <div class="article-card">
        <h2>Peugeot Pars ELX</h2>
        <a href="articles/pars-elx.html" class="btn-read">بررسی فنی</a>
    </div>

</div>

<script>
    function toggleCompare() {
        var x = document.getElementById("compare-engine");
        if (x.style.display === "none" || x.style.display === "") {
            x.style.display = "block";
        } else {
            x.style.display = "none";
        }
    }
</script>

</body>
</html>
