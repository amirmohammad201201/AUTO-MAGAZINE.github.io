<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Magazine | مرجع بررسی خودرو</title>
    <style>
        :root { --primary: #ff0000; --bg: #0d0d0d; --card-bg: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: Tahoma, sans-serif; margin: 0; }
        header { background: #000; padding: 60px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        .logo { font-size: 3rem; font-weight: 900; }
        .logo span { color: var(--primary); }
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 0 20px; }
        
        .car-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.2);
        }

        .badge { background: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 11px; }
        footer { text-align: center; padding: 40px; color: #444; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO <span>MAGAZINE</span></div>
    <p>بررسی تخصصی و فنی خودروهای برتر</p>
</header>

<div class="container" id="carContainer"></div>

<footer>
    &copy; 2026 Auto Magazine | تمامی حقوق محفوظ است
</footer>

<script>
    const cars = [
        { name: "تویوتا سوپرا", path: "articles/supra.html" },
        { name: "پژو پارس ELX", path: "#" },
        { name: "زانتیا 2000", path: "#" },
        { name: "نیسان GTR", path: "#" },
        { name: "دنا پلاس توربو", path: "#" },
        { name: "پژو 206 تیپ 5", path: "#" },
        { name: "ب‌ام‌و M4", path: "#" },
        { name: "پورشه 911", path: "#" },
        { name: "نیسان آبی", path: "#" },
        { name: "پیکان ", path: "#" }
    ];

    const container = document.getElementById('carContainer');

    cars.forEach(car => {
        const card = document.createElement('a');
        card.className = 'car-card';
        card.href = car.path;
        
        card.innerHTML = `
            <span class="badge">مشخصات فنی</span>
            <h3>${car.name}</h3>
            <p>بررسی قدرت موتور و پتانسیل تیونینگ</p>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
