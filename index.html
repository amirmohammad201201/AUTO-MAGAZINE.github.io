<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Magazine | مجله خودرو  </title>
    <style>
        /* فونت و استایل‌های اصلی */
        :root {
            --primary: #ff0000;
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: white;
            /* استفاده از فونت‌های استانداردتر برای فارسی */
            font-family: 'Segoe UI', Tahoma, 'Vazir', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1200&q=80') center/cover;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .logo { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: 2px; }
        .logo span { color: var(--primary); }
        
        .container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .car-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.4s;
            text-decoration: none;
            color: white;
        }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.2);
        }

        .car-card h3 { font-size: 1.5rem; margin: 15px 0; }
        .car-card p { color: #aaa; font-size: 0.9rem; }
        
        .badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO <span>MAGAZINE</span></div>
    <p>بررسی تخصصی ۱۰ خودرو برتر | امیر PX</p>
</header>

<div class="container" id="carContainer">
    </div>

<footer>
    &copy; 2026 Auto Magazine | تمامی حقوق برای امیر PX محفوظ است
</footer>

<script>
    // لیست محدود شده به ۱۰ ماشین
    const carList = [
        "پژو پارس ELX",
        "زانتیا 2000",
        "تویوتا سوپرا",
        "نیسان GTR",
        "دنا پلاس توربو",
        "پژو 206 تیپ 5",
        "ب‌ام‌و M4",
        "پورشه 911",
        "نیسان آبی ",
        "پیکان "
    ];

    const container = document.getElementById('carContainer');

    carList.forEach(car => {
        const card = document.createElement('div');
        card.className = 'car-card';
        card.innerHTML = `
            <span class="badge">بررسی فنی</span>
            <h3>${car}</h3>
            <p>مشخصات فنی، سرعت و پتانسیل تیونینگ</p>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
