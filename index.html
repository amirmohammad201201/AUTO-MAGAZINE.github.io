<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Magazine | مرجع فنی خودرو</title>
    <style>
        :root { --primary: #ff0000; --bg: #0d0d0d; --card-bg: #161616; --gold: #D4AF37; }
        body { background-color: var(--bg); color: white; font-family: Tahoma, sans-serif; margin: 0; }
        
        header { 
            background: #000; 
            padding: 50px 20px; 
            text-align: center; 
            border-bottom: 3px solid var(--gold); /* خط پایین هدر طلایی شد */
        }

        .logo { font-size: 3rem; font-weight: 900; color: white; margin: 0; }
        .logo span { color: var(--gold); } /* کلمه MAGAZINE طلایی شد */

        .header-subtitle { color: #888; font-size: 1rem; margin-top: 10px; }
        
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 20px; }
        
        .car-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .car-card:hover { border-color: var(--gold); background: #1a1a1a; transform: translateY(-5px); }
        .badge { background: var(--gold); color: black; padding: 3px 10px; border-radius: 15px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO <span>MAGAZINE</span></div>
    <p class="header-subtitle">بررسی تخصصی و فنی خودروها</p>
</header>

<div class="container" id="carContainer"></div>

<script>
    const cars = [
        { name: "تویوتا سوپرا", path: "articles/supra.html" },
        { name: "پژو پارس ELX", path: "articles/pars-elx.html" },
        { name: "زانتیا 2000", path: "articles/xantia.html" },
        { name: "دنا پلاس توربو", path: "#" },
        { name: "پژو 206 تیپ 5", path: "#" }
    ];

    const container = document.getElementById('carContainer');
    cars.forEach(car => {
        const card = document.createElement('a');
        card.className = 'car-card';
        card.href = car.path;
        card.innerHTML = <span class="badge">مشخصات فنی</span><h3>${car.name}</h3><p style="font-size: 12px; color: #666;">مشاهده جزئیات</p>;
        container.appendChild(card);
    });
</script>

</body>
</html>
