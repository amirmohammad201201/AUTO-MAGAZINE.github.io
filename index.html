<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Magazine | مرجع فنی خودرو</title>
    <style>
        :root { --primary: #ff0000; --bg: #0d0d0d; --card-bg: #161616; }
        body { background-color: var(--bg); color: white; font-family: Tahoma, sans-serif; margin: 0; }
        header { background: #000; padding: 50px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .logo { font-size: 2.5rem; font-weight: 900; }
        .logo span { color: var(--primary); }
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 20px; }
        
        .car-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .car-card:hover {
            border-color: var(--primary);
            background: #1a1a1a;
            transform: translateY(-5px);
        }

        .badge { background: var(--primary); padding: 3px 10px; border-radius: 15px; font-size: 10px; }
        footer { text-align: center; padding: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO <span>MAGAZINE</span></div>
    <p>بررسی تخصصی مشخصات فنی خودروها</p>
</header>

<div class="container" id="carContainer"></div>

<footer>
    &copy; 2026 Auto Magazine | تمامی حقوق محفوظ است
</footer>

<script>
    // اینجا لیست ماشین‌ها و آدرس دقیق فایل‌هایشان را ست می‌کنیم
    const cars = [
        { name: "تویوتا سوپرا", path: "articles/supra.html" },
        { name: "پژو پارس ELX", path: "articles/pars-elx.html" },
        { name: "زانتیا 2000", path: "articles/xantia.html" }, // اتصال به فایل زانتیا
        { name: "نیسان GTR", path: "#" },
        { name: "دنا پلاس توربو", path: "#" },
        { name: "پژو 206 تیپ 5", path: "#" },
        { name: "ب‌ام‌و M4", path: "#" },
        { name: "پورشه 911", path: "#" },
        { name: "Golf gte", path: "#" },
        { name: "پیکان ", path: "#" }
    ];

    const container = document.getElementById('carContainer');

    cars.forEach(car => {
        const card = document.createElement('a');
        card.className = 'car-card';
        card.href = car.path;
        
        card.innerHTML = `
            <span class="badge">مشخصات فنی</span>
            <h3>${car.name}</h3>
            <p>برای مشاهده جزئیات کلیک کنید</p>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
